<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title id="page-title">خبرزات — خبر</title>
  <meta name="description" content="" id="meta-desc">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header class="site-header small">
    <div class="brand">
      <img src="/images/ii.png" alt="خبرزات" class="logo">
      <div>
        <h1>خبرزات</h1>
      </div>
    </div>
  </header>

  <main class="container article-page">
    <article id="article-content" class="article-content"></article>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>© 2025 خبرزات</p>
    </div>
  </footer>

  <script>
    // client-side renderer: read ?slug= and show article from articles.json
    async function renderArticle() {
      const params = new URLSearchParams(location.search);
      const slug = params.get('slug');
      const res = await fetch('/articles.json');
      const list = await res.json();
      const a = list.find(it=>it.slug===slug) || list[0];
      document.getElementById('page-title').textContent = 'خبرزات — ' + a.title;
      document.getElementById('meta-desc').setAttribute('content', a.summary);
      const el = document.getElementById('article-content');
      el.innerHTML = `<h1>${a.title}</h1><div class="meta">${a.category} — ${a.date}</div><p>${a.summary}</p><p>متن کامل خبر نمونه است و برای نمایش قالب تولید شده است.</p>`;
    }
    renderArticle();
  </script>
</body>
</html>
